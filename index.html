<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Vibes Game | Paray</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 30px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        h2 { font-weight: 600; margin-bottom: 10px; font-size: 1.5rem; }
        p.subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
        }

        .option-btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        #final-screen { display: none; }
        .highlight { color: var(--primary); font-weight: 600; }
        
        .sending-msg {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="glass-card" id="quiz-card">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question-container">
            <h2 id="greeting">Hey <span class="highlight">Pramila</span>!</h2>
            <p class="subtitle" id="q-text">Ready for a quick question vibe Game?</p>
            <div class="options-grid" id="options">
                <button class="option-btn" onclick="startQuiz()">Let's Do It ✨</button>
            </div>
        </div>

        <div id="final-screen">
            <h2 id="final-title">Now I Will Guess Your Answer, So Be True hai.</h2>
            <p id="final-msg">Exited and Happy</p>
            <p class="sending-msg" id="status">Syncing results...</p>
            <button class="option-btn" style="margin-top:20px" onclick="location.reload()">Take it again?</button>
        </div>
    </div>

    <script>
        const ACCESS_KEY = "a04ed73a-e707-4d3e-ac7c-167693602454";
        
        const questions = [
            { q: "What do you think I have feelings for you or not?", a: ["I think Yes", "Nope", "I don't know"] },
            { q: "How Much you love me?", a: ["0%", "100%🥹", "I hate You😈"] },
            { q: "What is the rank of me as a guy in your life ?", a: ["2nd", "3rd", "4th", "5th", "6th", "Last"] },
            { q: "What I am for you?", a: ["Husband", "Partner", "Nothing"] },
            { q: "How many times in a day you miss me?", a: ["more than 100 times", "I miss but i don't how many times", "I don't miss you"] },
            { q: "Choose one option", a: ["Coffee with You", "Adventure with you", "Hangout a day with you", "All"] },
            { q: "What do you like about me most?", a: ["Personality", "Kind & Humble", "Loving", "Mature", "Nonsense"] },
            { q: "What was your answer if he say I love You Pramila💟.", a: ["I love you to Nir", "I hate you go to hell", "sorry i don't want you"] },
            ];

        let currentIdx = 0;
        let selectedAnswers = [];

        function startQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('greeting').innerHTML = `Question <span class="highlight">${currentIdx + 1}</span>/8`;
            document.getElementById('q-text').innerText = q.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.a.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = answer;
                btn.onclick = () => handleAnswer(answer);
                optionsDiv.appendChild(btn);
            });

            updateProgress();
        }

        function handleAnswer(answer) {
            // Save the answer with the question text
            selectedAnswers.push(`${questions[currentIdx].q} -> Answer: ${answer}`);
            
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                showFinal();
            }
        }

        function updateProgress() {
            const percent = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        async function showFinal() {
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('question-container').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff758c', '#ff7eb3', '#ffffff']
            });

            // Auto-send the email using Web3Forms
            try {
                const response = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({
                        access_key: ACCESS_KEY,
                        subject: "New Vibe Check Results from Girl!",
                        from_name: "Mimi's Choice Bot",
                        message: "Here are the answers chosen by Girl:\n\n" + selectedAnswers.join("\n")
                    })
                });
                
                if (response.ok) {
                    document.getElementById('status').innerText = "What a Lovely Answer Paray";
                }
            } catch (e) {
                console.log("Email failed to send", e);
            }
        }
    </script>
</body>
</html>
